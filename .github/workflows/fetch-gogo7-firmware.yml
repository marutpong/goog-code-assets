name: Fetch GoGo7 Firmware Release

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-gogo7-firmware]

jobs:
  fetch-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch latest release from gogo7-firmware
        run: |
          RESPONSE=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/LILCMU/gogo7-firmware/releases/latest)

          echo "$RESPONSE" | jq '{
            id: .id,
            tag_name: .tag_name,
            name: .name,
            body: .body,
            published_at: .published_at,
            updated_at: .updated_at
          }' > releases/gogo7-firmware.json

          echo "Fetched release: $(echo "$RESPONSE" | jq -r '.tag_name')"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/gogo7-firmware.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update gogo7-firmware release data"
            git push
          fi
